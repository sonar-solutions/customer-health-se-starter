sonar.projectKey=customer-health-scorecard
sonar.projectName=Customer Health Scorecard
sonar.projectVersion=0.1.0
sonar.organization=sonar-solutions

# Multi-module setup
sonar.modules=backend,frontend

# Backend module
backend.sonar.projectBaseDir=backend
backend.sonar.sources=app
backend.sonar.tests=tests
backend.sonar.python.version=3
backend.sonar.python.coverage.reportPaths=coverage.xml

# Frontend module
frontend.sonar.projectBaseDir=frontend
frontend.sonar.sources=src
frontend.sonar.tests=tests
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.typescript.tsconfigPath=tsconfig.json
